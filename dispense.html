<head>
    <meta charset="UTF-8">

    <title>Dispense e Link Utili | FarinaEma</title>
    <meta name="description"
        content="Dispense, appunti e link utili raccolti da Emanuele Farina durante il percorso di Ingegneria Meccanica.">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('theme-dark');
            }
        })();

        function setTheme(theme) {
            if (theme === 'dark') {
                document.body.classList.add('theme-dark');
                localStorage.setItem('theme', 'dark');
            } else {
                document.body.classList.remove('theme-dark');
                localStorage.setItem('theme', 'classic');
            }
        }
    </script>

    <div style="text-align: right; font-size: 0.8em; margin-bottom: 15px;">
        [Tema: <a href="javascript:void(0)" onclick="setTheme('classic')">Chiaro</a> | <a href="javascript:void(0)" onclick="setTheme('dark')">Scuro</a>]
        [<a href="index.html">← Home</a>]
    </div>
